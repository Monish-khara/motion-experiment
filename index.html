<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Halftone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.162.0",
    "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const PaletteVertShader = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vViewDir;
  void main() {
    vNormal = normalize(normalMatrix * normal);
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const PaletteFragShader = `
  uniform float time;
  uniform float colorShift;
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vViewDir;

  vec3 palette[7];

  void initPalette() {
    palette[0] = vec3(0.99, 0.95, 0.80); // warm cream
    palette[1] = vec3(0.98, 0.86, 0.15); // sunflower yellow
    palette[2] = vec3(0.96, 0.62, 0.12); // warm orange
    palette[3] = vec3(0.90, 0.40, 0.28); // coral/salmon
    palette[4] = vec3(0.55, 0.78, 0.18); // spring green
    palette[5] = vec3(0.72, 0.86, 0.78); // soft mint
    palette[6] = vec3(0.82, 0.72, 0.10); // deep golden
  }

  void main() {
    initPalette();
    vec3 n = normalize(vNormal);

    float fresnel = pow(1.0 - abs(dot(n, vViewDir)), 2.0);

    float angle = atan(n.y, n.x) + time * 0.15 + colorShift;
    float idx = mod(angle / 6.2832 * 7.0 + 7.0, 7.0);
    int i0 = int(floor(idx));
    int i1 = int(mod(float(i0) + 1.0, 7.0));
    float fr = fract(idx);

    vec3 c0 = palette[0];
    vec3 c1 = palette[0];
    for (int i = 0; i < 7; i++) {
      if (i == i0) c0 = palette[i];
      if (i == i1) c1 = palette[i];
    }
    vec3 baseColor = mix(c0, c1, smoothstep(0.3, 0.7, fr));

    float zInfluence = n.z * 0.5 + 0.5;
    baseColor = mix(baseColor * 0.5, baseColor, zInfluence);

    vec3 rimColor = mix(palette[3], palette[5], sin(time * 0.3 + vWorldPos.y) * 0.5 + 0.5);
    baseColor = mix(baseColor, rimColor, fresnel * 0.55);

    vec3 lightDir = normalize(vec3(sin(time * 0.2), cos(time * 0.15), 0.8));
    float diffuse = max(dot(n, lightDir), 0.0);
    baseColor *= 0.4 + diffuse * 0.6;

    gl_FragColor = vec4(baseColor, 1.0);
  }
`;

const PixelHalftoneShader = {
  uniforms: {
    tDiffuse: { value: null },
    resolution: { value: new THREE.Vector2() },
    pixelSize: { value: 22.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 resolution;
    uniform float pixelSize;
    varying vec2 vUv;

    vec3 palette[8];

    void initPalette() {
      palette[0] = vec3(0.99, 0.95, 0.80); // warm cream
      palette[1] = vec3(0.98, 0.86, 0.15); // sunflower yellow
      palette[2] = vec3(0.96, 0.62, 0.12); // warm orange
      palette[3] = vec3(0.90, 0.40, 0.28); // coral
      palette[4] = vec3(0.55, 0.78, 0.18); // spring green
      palette[5] = vec3(0.72, 0.86, 0.78); // soft mint
      palette[6] = vec3(0.82, 0.72, 0.10); // deep golden
      palette[7] = vec3(0.0);              // black
    }

    vec3 findClosest(vec3 color) {
      float minDist = 999.0;
      vec3 closest = vec3(0.0);
      for (int i = 0; i < 8; i++) {
        float d = distance(color, palette[i]);
        if (d < minDist) {
          minDist = d;
          closest = palette[i];
        }
      }
      return closest;
    }

    void main() {
      initPalette();

      vec2 grid = vUv * resolution / pixelSize;
      vec2 blockIdx = floor(grid);
      vec2 withinPixel = fract(grid);

      vec2 sampleUv = (blockIdx * pixelSize + pixelSize * 0.5) / resolution;
      vec4 texColor = texture2D(tDiffuse, sampleUv);
      float lum = dot(texColor.rgb, vec3(0.299, 0.587, 0.114));

      if (lum < 0.02) {
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }

      vec3 quantized = findClosest(texColor.rgb);

      // Gap between pixel blocks
      float gap = 0.04;
      if (withinPixel.x < gap || withinPixel.x > 1.0 - gap ||
          withinPixel.y < gap || withinPixel.y > 1.0 - gap) {
        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        return;
      }

      // Halftone dot — dark squircle on colored block
      vec2 d = abs(withinPixel - 0.5);
      float squircle = pow(d.x, 2.8) + pow(d.y, 2.8);
      float dotRadius = 0.06 + (1.0 - lum) * 0.22;
      float dot = smoothstep(dotRadius + 0.012, dotRadius - 0.012, pow(squircle, 1.0 / 2.8));
      vec3 finalColor = mix(quantized, quantized * 0.04, dot);

      gl_FragColor = vec4(finalColor, 1.0);
    }
  `
};

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 3.2;

const group = new THREE.Group();
scene.add(group);

function makeMat(shift) {
  return new THREE.ShaderMaterial({
    uniforms: {
      time: { value: 0 },
      colorShift: { value: shift },
    },
    vertexShader: PaletteVertShader,
    fragmentShader: PaletteFragShader,
  });
}

const knot = new THREE.Mesh(
  new THREE.TorusKnotGeometry(1.3, 0.5, 256, 48, 2, 3),
  makeMat(0.0)
);
group.add(knot);

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.75, 64, 64),
  makeMat(2.0)
);
sphere.position.set(1.6, 0.9, -0.3);
group.add(sphere);

const torus = new THREE.Mesh(
  new THREE.TorusGeometry(0.9, 0.35, 48, 80),
  makeMat(4.0)
);
torus.position.set(-1.0, -0.7, 0.5);
torus.rotation.x = Math.PI / 2.5;
group.add(torus);

const dod = new THREE.Mesh(
  new THREE.DodecahedronGeometry(0.6, 2),
  makeMat(1.0)
);
dod.position.set(-1.5, 1.2, -0.6);
group.add(dod);

const cone = new THREE.Mesh(
  new THREE.ConeGeometry(0.55, 1.3, 48),
  makeMat(3.0)
);
cone.position.set(0.4, -1.5, 0.2);
group.add(cone);

const oct = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.5, 2),
  makeMat(5.0)
);
oct.position.set(1.8, -0.8, 0.3);
group.add(oct);

const allMeshes = [knot, sphere, torus, dod, cone, oct];

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const halftonePass = new ShaderPass(PixelHalftoneShader);
halftonePass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
composer.addPass(halftonePass);

window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  composer.setSize(w, h);
  halftonePass.uniforms.resolution.value.set(w, h);
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  allMeshes.forEach(m => {
    m.material.uniforms.time.value = t;
  });

  group.rotation.y = t * 0.1;
  group.rotation.x = Math.sin(t * 0.07) * 0.2;

  knot.rotation.x = t * 0.45;
  knot.rotation.z = t * 0.3;

  sphere.rotation.y = t * 0.25;
  sphere.position.y = 0.9 + Math.sin(t * 0.35) * 0.3;

  torus.rotation.z = t * 0.35;
  torus.rotation.y = t * 0.22;

  dod.rotation.x = t * 0.18;
  dod.rotation.z = t * 0.22;
  dod.position.y = 1.2 + Math.cos(t * 0.3) * 0.2;

  cone.rotation.y = t * 0.3;
  cone.rotation.z = Math.sin(t * 0.25) * 0.35;

  oct.rotation.x = t * 0.22;
  oct.rotation.y = t * 0.15;
  oct.position.x = 1.8 + Math.sin(t * 0.28) * 0.2;

  const breathe = 1.0 + Math.sin(t * 0.25) * 0.05;
  group.scale.setScalar(breathe);

  camera.position.x = Math.sin(t * 0.05) * 1.0;
  camera.position.y = Math.cos(t * 0.07) * 0.5;
  camera.position.z = 3.2 + Math.sin(t * 0.03) * 0.5;
  camera.lookAt(0, 0, 0);

  composer.render();
}

animate();
</script>
</body>
</html>
